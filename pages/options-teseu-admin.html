<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <title>www.teseu.net 后台 - 自动填写</title>
    <link rel="stylesheet" href="../libs/mvp.css"/>
    <style>
        body {
            margin: 0;
            max-width: none;
            padding: 0;
        }

        .page-header {
            padding: 18px 20px 14px;
            margin-bottom: 12px;
            border-bottom: 1px solid #d9d9d9;
            background: #fafafa;
            width: 100%;
            max-width: none;
            margin-left: 0;
            margin-right: 0;
            box-sizing: border-box;
        }

        .top-nav {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 0;
        }

        .top-nav a {
            text-decoration: none;
            border: 1px solid #007bff;
            border-radius: 4px;
            padding: 6px 10px;
            color: #007bff;
            font-family: monospace;
            font-size: 13px;
        }

        .top-nav a.active {
            background: #007bff;
            color: #fff;
        }

        .site-url-row {
            padding: 0 20px 12px;
            border-bottom: 1px solid #ededed;
        }

        .site-url-link {
            color: #1b6ac9;
            text-decoration: underline;
            font-family: monospace;
            font-size: 13px;
        }

        .page-content {
            padding: 0 20px 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            align-items: stretch;
            padding: 20px;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-right: 40px;
            height: 100%;
            justify-content: space-between;
        }

        #status {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #f8f8f8;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            color: #333;
            white-space: pre-wrap;
            width: 900px;
            flex-grow: 1;
            height: 150px;
            max-height: 150px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .file-upload-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-upload-button {
            border: 1px solid #007bff;
            color: #fff;
            background-color: #007bff;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .file-upload-button:hover {
            background-color: #0056b3;
        }

        .file-upload-wrapper input[type="file"] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-name-label {
            font-family: monospace;
            font-size: 13px;
            color: #555;
            margin-left: 8px;
            margin-top: 0;
            user-select: none;
            width: 200px;
            white-space: normal;
            word-break: break-word;
        }

        .interval-label {
            font-family: monospace;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>

<header class="page-header">
    <nav class="top-nav">
        <a href="options-michpong.html">www.michpong.com</a>
        <a href="options-teseu.html">www.teseu.net</a>
        <a class="active" href="options-teseu-admin.html">www.teseu.net 后台</a>
    </nav>
</header>

<div class="site-url-row">
    点击跳转：<a class="site-url-link" href="https://www.teseu.net/wp-admin/" target="_blank" rel="noopener noreferrer">https://www.teseu.net/wp-admin/</a>
</div>

<main class="page-content">
<div class="container">
    <div class="left-column">
        <div class="file-upload-row">
            <div class="file-upload-wrapper">
                <button class="file-upload-button">选择 Excel 文件</button>
                <input type="file" id="excelFile" accept=".xlsx">
            </div>
            <span class="file-name-label" id="fileName">未选择文件</span>
        </div>

        <button id="run">开始自动填写数据并提交</button>
        <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
            <label class="interval-label" for="intervalInput">自动操作间隔时间：</label>
            <input type="number" id="intervalInput" min="0" value="1"
                   style="width: 60px; font-family: monospace; font-size: 13px; color: #555;">
            <span class="interval-label">秒</span>
        </div>

    </div>

    <div id="status">
操作步骤：
1. 请先登录 www.teseu.net/wp-admin/ 后台，进入后台界面
2. 然后选择 Excel 文件 (www.teseu.net_admin_template.xlsx)
3. 最后点击“开始自动填写数据并提交”按钮
    </div>
</div>

<div id="tableContainer"></div>
</main>

<script src="../libs/xlsx.full.min.js"></script>
<script src="../scripts/options-teseu-admin.js"></script>

</body>
</html>
